<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Guardar Pokémon</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h3 th:text="${pokemon.id == null ? 'Nuevo Pokémon' : 'Editar Pokémon'}"></h3>
        </div>
        <div class="card-body">
            <form th:action="@{/save}" th:object="${pokemon}" method="post">
                <!-- Campo oculto para el ID si estamos editando -->
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Altura</label>
                        <input type="number" th:field="*{height}" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Peso</label>
                        <input type="number" th:field="*{weight}" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">URL de Imagen</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="http://...">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" th:field="*{is_default}" class="form-check-input" id="defaultCheck">
                    <label class="form-check-label" for="defaultCheck">Es predeterminado</label>
                </div>

                <div class="d-flex justify-content-end">
                    <a th:href="@{/}" class="btn btn-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
