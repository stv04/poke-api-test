<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Pokedex Manager</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Pokédex Local</h1>
        <a th:href="@{/new}" class="btn btn-primary">Nuevo Pokémon</a>
    </div>

    <table class="table table-hover bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Altura</th>
                <th>Peso</th>
                <th>Exp. Base</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pokemons}">
                <td><img th:src="${p.imageUrl}" width="50" height="50" class="rounded-circle shadow-sm"></td>
                <td th:text="${p.name}" class="text-capitalize fw-bold"></td>
                <td th:text="${p.height}"></td>
                <td th:text="${p.weight}"></td>
                <td th:text="${p.baseExperience}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/delete/{id}(id=${p.id})}" 
                       class="btn btn-sm btn-danger" 
                       onclick="return confirm('¿Seguro que deseas eliminarlo?')">Borrar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
